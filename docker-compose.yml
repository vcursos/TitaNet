version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: titanet_dev
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  web:
    build: .
    ports:
      - '3000:3000'
    env_file:
      - .env
    depends_on:
      - db

volumes:
  db_data:
